name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('alpha'),
            })
            return data.id

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles deb,rpm,appimage
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file ca-certificates unzip \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            libsoup-3.0-dev libharfbuzz-dev libbz2-dev liblzma-dev \
            librime-dev libclang-dev clang \
            libfreetype6-dev \
            libxdo-dev xdg-utils \
            gcc libc6-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            rpm fakeroot dpkg-dev libfuse2 \
            mold

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs')
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '')
          const path = 'src-tauri/tauri.conf.json'
          const config = JSON.parse(fs.readFileSync(path, 'utf8'))
          config.version = version
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`)
          NODE

      - name: Pre-build keytao-linux-ime
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          cargo build -p keytao-linux-ime --release
          test -x "$PWD/target/release/keytao-ime"
          echo "KEYTAO_IME_PATH=$PWD/target/release/keytao-ime" >> "$GITHUB_ENV"
          echo 'TAURI_CONFIG={"bundle":{"externalBin":["binaries/keytao-ime"]}}' >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

      - name: Verify Linux bundles include keytao-ime
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/keytao-ime-x86_64-unknown-linux-gnu"
          test -s "$sidecar"

          deb="$(find target/release/bundle/deb -name '*.deb' -print -quit)"
          test -n "$deb"
          dpkg-deb -c "$deb" | grep -E 'keytao-ime(-x86_64-unknown-linux-gnu)?'

          rpm_pkg="$(find target/release/bundle/rpm -name '*.rpm' -print -quit)"
          test -n "$rpm_pkg"
          rpm -qpl "$rpm_pkg" | grep -E 'keytao-ime(-x86_64-unknown-linux-gnu)?'

          appimage="$(find target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          chmod +x "$appimage"
          rm -rf squashfs-root
          "$appimage" --appimage-extract >/dev/null
          find squashfs-root -name '*keytao-ime*' -print -quit | grep keytao-ime
          rm -rf squashfs-root

      - name: Upload Linux tar.gz to release
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          app_bin="$(find target/release -maxdepth 1 -type f -perm -111 \
            ! -name 'keytao-ime' ! -name '*.so' -print -quit)"
          test -n "$app_bin"
          app_name="$(basename "$app_bin")"
          tar -czf "target/release/bundle/keytao-installer-${VERSION}-linux-x86_64.tar.gz" \
            -C target/release "$app_name" keytao-ime
          gh release upload ${{ github.ref_name }} \
            "target/release/bundle/keytao-installer-${VERSION}-linux-x86_64.tar.gz" \
            --clobber

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          node <<'NODE'
          const fs = require('fs')
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '')
          const path = 'src-tauri/tauri.conf.json'
          const config = JSON.parse(fs.readFileSync(path, 'utf8'))
          config.version = version
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`)
          NODE

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore_orig.jks"
          keytool -importkeystore \
            -srckeystore "$RUNNER_TEMP/keystore_orig.jks" \
            -destkeystore "$RUNNER_TEMP/keystore.jks" \
            -deststoretype JKS \
            -srcstorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -deststorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -noprompt
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          pnpm tauri android build --apk

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find src-tauri/gen/android -name "*.apk" | grep -v "/test/" | head -1)
          RENAMED="keytao-installer_${VERSION}_android.apk"
          cp "$APK" "$RENAMED"
          gh release upload ${{ github.ref_name }} "$RENAMED" --clobber
