name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('alpha'),
            })
            return data.id

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles deb,rpm --config src-tauri/tauri.linux.conf.json
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            file ca-certificates unzip \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            libsoup-3.0-dev libharfbuzz-dev libbz2-dev liblzma-dev \
            librime-dev libclang-dev clang \
            libfreetype6-dev \
            libxdo-dev xdg-utils \
            gcc libc6-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            rpm fakeroot dpkg-dev \
            mold

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          node scripts/sync-version.mjs --set "${GITHUB_REF_NAME#v}"

      - name: Pre-build keytao-linux-ime
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p keytao-linux-ime --release
          test -x "$PWD/target/release/keytao-ime"
          target_triple="$(rustc -vV | sed -n 's/^host: //p')"
          sidecar="src-tauri/binaries/keytao-ime-${target_triple}"
          mkdir -p "$(dirname "$sidecar")"
          cp "$PWD/target/release/keytao-ime" "$sidecar"
          chmod +x "$sidecar"
          ls -lh "$sidecar"
          echo "KEYTAO_IME_PATH=$PWD/target/release/keytao-ime" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

      - name: Verify Linux bundles include keytao-ime
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          ime_pattern='(^|/)keytao-ime(-x86_64-unknown-linux-gnu)?$'

          show_bundle_tree() {
            echo "Bundle files:"
            find target/release/bundle -maxdepth 4 -type f -print 2>/dev/null | sort || true
          }

          find_one() {
            local result_var="$1"
            local dir="$2"
            local pattern="$3"
            local label="$4"
            local path
            path="$(find "$dir" -name "$pattern" -print -quit 2>/dev/null || true)"
            if [[ -z "$path" ]]; then
              echo "::error::Missing $label in $dir"
              show_bundle_tree
              exit 1
            fi
            printf -v "$result_var" '%s' "$path"
          }

          require_match() {
            local label="$1"
            local listing="$2"
            if ! printf '%s\n' "$listing" | grep -E "$ime_pattern"; then
              echo "::error::$label does not include keytao-ime"
              exit 1
            fi
          }

          sidecar="src-tauri/binaries/keytao-ime-x86_64-unknown-linux-gnu"
          if [[ ! -x "$sidecar" ]]; then
            echo "::error::Missing executable Linux keytao-ime sidecar at $sidecar"
            find src-tauri/binaries -maxdepth 1 -type f -print 2>/dev/null | sort || true
            exit 1
          fi
          ls -lh "$sidecar"
          echo "Tauri Linux config:"
          sed -n '1,80p' src-tauri/tauri.linux.conf.json
          show_bundle_tree

          find_one deb target/release/bundle/deb '*.deb' 'deb bundle'
          echo "Inspecting deb: $deb"
          require_match "deb bundle" "$(dpkg-deb -c "$deb")"

          find_one rpm_pkg target/release/bundle/rpm '*.rpm' 'rpm bundle'
          echo "Inspecting rpm: $rpm_pkg"
          require_match "rpm bundle" "$(rpm -qpl "$rpm_pkg")"

      - name: Upload Linux tar.gz to release
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          app_bin="$(find target/release -maxdepth 1 -type f -perm -111 \
            ! -name 'keytao-ime' ! -name '*.so' -print -quit)"
          test -n "$app_bin"
          app_name="$(basename "$app_bin")"
          tar -czf "target/release/bundle/keytao-app-${VERSION}-linux-x86_64.tar.gz" \
            -C target/release "$app_name" keytao-ime
          gh release upload ${{ github.ref_name }} \
            "target/release/bundle/keytao-app-${VERSION}-linux-x86_64.tar.gz" \
            --clobber

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          node scripts/sync-version.mjs --set "${GITHUB_REF_NAME#v}"

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore_orig.jks"
          keytool -importkeystore \
            -srckeystore "$RUNNER_TEMP/keystore_orig.jks" \
            -destkeystore "$RUNNER_TEMP/keystore.jks" \
            -deststoretype JKS \
            -srcstorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -deststorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -noprompt
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Init Android project
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          pnpm tauri android init

      - name: Build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          unset BZIP2_LIB_DIR BZIP2_INCLUDE_DIR
          pnpm tauri android build --apk

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find src-tauri/gen/android -name "*.apk" | grep -v "/test/" | head -1)
          RENAMED="keytao-app_${VERSION}_android.apk"
          cp "$APK" "$RENAMED"
          gh release upload ${{ github.ref_name }} "$RENAMED" --clobber
