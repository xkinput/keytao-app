name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('alpha'),
            })
            return data.id

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: linux-docker
          - platform: macos-latest
            args: macos-pkg
          - platform: windows-latest
            args: --bundles nsis --config src-tauri/tauri.windows.conf.json

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform != 'ubuntu-22.04'
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        if: matrix.platform != 'ubuntu-22.04'
        with:
          workspaces: src-tauri

      - name: Install Linux verification deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev patchelf rpm

      - name: Install Windows system deps
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm 7zip -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - if: matrix.platform != 'ubuntu-22.04'
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          node scripts/sync-version.mjs --set "${GITHUB_REF_NAME#v}"

      - name: Build Linux packages
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-linux.sh

      - name: Pre-build keytao-windows-ime
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File scripts\build-windows-ime.ps1

          $vendorDir = (Resolve-Path "vendor\librime\windows-x64").Path
          $includeDir = Join-Path $vendorDir "include"
          $libDir = Join-Path $vendorDir "lib"
          $binDir = Join-Path $vendorDir "bin"
          $runtimeDir = (Resolve-Path "target\keytao-windows-ime-runtime\x64").Path
          $appRuntimeDir = (Resolve-Path "target\keytao-windows-app-runtime").Path

          if (-not (Test-Path (Join-Path $runtimeDir "keytao_windows_ime.dll"))) {
            throw "Missing keytao_windows_ime.dll in $runtimeDir"
          }
          if (-not (Test-Path (Join-Path $runtimeDir "rime.dll"))) {
            throw "Missing rime.dll in $runtimeDir"
          }
          if (-not (Test-Path (Join-Path $runtimeDir "rime-data\default.yaml"))) {
            throw "Missing bundled rime-data in $runtimeDir"
          }
          if (-not (Test-Path (Join-Path $runtimeDir "vcruntime140.dll"))) {
            throw "Missing vcruntime140.dll in $runtimeDir"
          }
          if (-not (Test-Path (Join-Path $appRuntimeDir "rime.dll"))) {
            throw "Missing app startup rime.dll in $appRuntimeDir"
          }

          "RIME_INCLUDE_DIR=$includeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RIME_LIB_DIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Get-ChildItem $runtimeDir
          Get-ChildItem $appRuntimeDir

      - name: Build macOS pkg
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          pnpm build:macos

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

      - name: Verify macOS pkg
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-macos-pkg.sh target/keytao-macos-pkg/KeyTao.pkg

      - name: Upload macOS pkg to release
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          case "${RUNNER_ARCH:-$(uname -m)}" in
            X64|x64|x86_64) mac_arch="x86_64" ;;
            ARM64|arm64|aarch64) mac_arch="arm64" ;;
            *) mac_arch="$(uname -m)" ;;
          esac
          pkg="target/keytao-macos-pkg/KeyTao.pkg"
          renamed="target/keytao-macos-pkg/keytao-app-${VERSION}-macos-${mac_arch}.pkg"
          test -f "$pkg"
          cp "$pkg" "$renamed"
          gh release upload ${{ github.ref_name }} "$renamed" --clobber

      - name: Verify Windows bundle includes keytao-windows-ime
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem -Path "target\release\bundle\nsis" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            throw "Missing Windows NSIS installer"
          }
          $forbiddenInstallers = Get-ChildItem -Path "target\release\bundle" -Recurse -File |
            Where-Object { $_.Extension -in @(".msi", ".zip", ".appx", ".msix", ".msixbundle") }
          if ($forbiddenInstallers) {
            throw "Windows build must only produce the NSIS .exe installer. Unexpected artifacts: $($forbiddenInstallers.FullName -join ', ')"
          }

          $imeDll = Get-ChildItem -Path "target\release" -Recurse -Filter "keytao_windows_ime.dll" -File | Select-Object -First 1
          $rimeDll = Get-ChildItem -Path "target\release" -Recurse -Filter "rime.dll" -File | Select-Object -First 1
          $rimeData = Get-ChildItem -Path "target\release" -Recurse -Filter "default.yaml" -File |
            Where-Object { $_.FullName -like "*rime-data*" } |
            Select-Object -First 1
          $vcRuntime = Get-ChildItem -Path "target\release" -Recurse -Filter "vcruntime140.dll" -File | Select-Object -First 1
          $installerScript = "target\release\nsis\x64\installer.nsi"

          if (-not $imeDll) {
            throw "Windows bundle does not include keytao_windows_ime.dll"
          }
          if (-not $rimeDll) {
            throw "Windows bundle does not include rime.dll"
          }
          if (-not $rimeData) {
            throw "Windows bundle does not include rime-data\default.yaml"
          }
          if (-not $vcRuntime) {
            throw "Windows bundle does not include vcruntime140.dll"
          }
          if (-not (Test-Path $installerScript)) {
            throw "Missing generated NSIS installer script"
          }
          if (-not (Select-String -Path $installerScript -Pattern '/oname=rime\.dll' -Quiet)) {
            throw "Windows installer does not install rime.dll next to keytao-app.exe"
          }

          Write-Host "Installer: $($installer.FullName)"
          Write-Host "IME DLL: $($imeDll.FullName)"
          Write-Host "Rime DLL: $($rimeDll.FullName)"
          Write-Host "Rime data: $($rimeData.FullName)"
          Write-Host "VC Runtime: $($vcRuntime.FullName)"

      - name: Verify Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-linux-bundles.sh target/release/bundle

      - name: Upload Linux artifacts to release
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' \) | sort)
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "::error::No Linux artifacts found in dist"
            find target/release/bundle -maxdepth 4 -type f -print 2>/dev/null | sort || true
            exit 1
          fi
          gh release upload ${{ github.ref_name }} "${artifacts[@]}" --clobber

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.0.12077973"

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          node scripts/sync-version.mjs --set "${GITHUB_REF_NAME#v}"

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore_orig.jks"
          keytool -importkeystore \
            -srckeystore "$RUNNER_TEMP/keystore_orig.jks" \
            -destkeystore "$RUNNER_TEMP/keystore.jks" \
            -deststoretype JKS \
            -srcstorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -deststorepass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -noprompt
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Init Android project
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          pnpm tauri android init

      - name: Build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          unset BZIP2_LIB_DIR BZIP2_INCLUDE_DIR
          pnpm tauri android build --apk

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find src-tauri/gen/android -name "*.apk" | grep -v "/test/" | head -1)
          RENAMED="keytao-app_${VERSION}_android.apk"
          cp "$APK" "$RENAMED"
          gh release upload ${{ github.ref_name }} "$RENAMED" --clobber
