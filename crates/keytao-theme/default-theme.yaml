# KeyTao IME default theme.
# Copy this file to the platform user data directory as theme.yaml and edit it
# to override the bundled style.

version: 2

ui:
  colorScheme: auto

font:
  family: ""
  size: 18
  labelSize: 14
  commentSize: 13
  preeditSize: 15
  weight: medium

panel:
  orientation: horizontal
  background: "#F8FAFFF2"
  borderColor: "#D8E2F1"
  borderWidth: 1
  cornerRadius: 14
  paddingX: 8
  paddingY: 7
  gap: 6
  minWidth: 96
  maxWidth: 820
  maxHeight: 460
  screenMargin: 8
  shadow: true

candidate:
  background: transparent
  hoverBackground: "#F1F6FF"
  selectedBackground: "#E6F0FF"
  foreground: "#1F2933"
  selectedForeground: "#14233B"
  labelColor: "#6B7785"
  selectedLabelColor: "#3B73D9"
  commentColor: "#7A8790"
  selectedCommentColor: "#526A91"
  borderColor: transparent
  selectedBorderColor: "#A8C7FA"
  borderWidth: 0
  cornerRadius: 9
  paddingX: 11
  paddingY: 6
  inlineGap: 5
  minHeight: 32
  maxWidth: 210
  separatorVisible: false
  separatorColor: "#DCE7F7"
  labelSuffix: "."

navigation:
  foreground: "#4A5966"
  disabledForeground: "#A5B0B8"
  hoverBackground: "#F1F6FF"
  buttonSize: 28
  cornerRadius: 8

modeHint:
  background: "#2D4B63"
  foreground: "#FFFFFF"
  borderColor: "#5DA7D7"
  borderWidth: 1
  fontSize: 24
  width: 72
  height: 48
  cornerRadius: 14
  duration: 0.75
  shadow: true
  chineseText: "中"
  englishText: "英"

dark:
  panel:
    background: "#171A20F2"
    borderColor: "#373D48"
    shadow: true

  candidate:
    hoverBackground: "#222A33"
    selectedBackground: "#2D4B63"
    foreground: "#EEF3F7"
    selectedForeground: "#FFFFFF"
    labelColor: "#9AA8B5"
    selectedLabelColor: "#B6E3FF"
    commentColor: "#94A0AA"
    selectedCommentColor: "#D3E4EE"
    borderColor: transparent
    selectedBorderColor: "#5DA7D7"
    separatorColor: "#343C47"

  navigation:
    foreground: "#C8D2DA"
    disabledForeground: "#66717C"
    hoverBackground: "#242D36"

  modeHint:
    background: "#2D4B63"
    foreground: "#FFFFFF"
    borderColor: "#5DA7D7"
    borderWidth: 1
